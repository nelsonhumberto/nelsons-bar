<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="80%">
      <stop offset="0%" stop-color="#1f2330"/>
      <stop offset="60%" stop-color="#10131c"/>
      <stop offset="100%" stop-color="#05060a"/>
    </radialGradient>
    <linearGradient id="whiskey" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5c662"/>
      <stop offset="55%" stop-color="#c89b3c"/>
      <stop offset="100%" stop-color="#7e5722"/>
    </linearGradient>
    <linearGradient id="glassRim" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f5c662" stop-opacity="0.85"/>
      <stop offset="50%" stop-color="#fff1c6" stop-opacity="1"/>
      <stop offset="100%" stop-color="#c89b3c" stop-opacity="0.85"/>
    </linearGradient>
    <linearGradient id="glassEdge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c89b3c" stop-opacity="0.55"/>
      <stop offset="50%" stop-color="#f5c662" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#c89b3c" stop-opacity="0.55"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="55%" r="50%">
      <stop offset="0%" stop-color="#f5c662" stop-opacity="0.45"/>
      <stop offset="60%" stop-color="#c89b3c" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#c89b3c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ice" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.10"/>
    </radialGradient>
  </defs>

  <!-- Rounded square background (midnight) -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>

  <!-- Soft amber glow behind glass -->
  <circle cx="256" cy="290" r="200" fill="url(#glow)"/>

  <!-- Glass body (rocks tumbler shape) -->
  <g>
    <!-- Whiskey fill -->
    <path d="M 152 240
             L 360 240
             L 348 400
             Q 348 426 320 426
             L 192 426
             Q 164 426 164 400
             Z"
          fill="url(#whiskey)"/>

    <!-- Whiskey surface highlight -->
    <ellipse cx="256" cy="240" rx="104" ry="10" fill="#f5c662" opacity="0.55"/>

    <!-- Ice cube -->
    <g transform="translate(232 252) rotate(-8)">
      <rect x="0" y="0" width="58" height="52" rx="6" fill="url(#ice)" opacity="0.9"/>
      <rect x="0" y="0" width="58" height="52" rx="6" fill="none" stroke="#ffffff" stroke-opacity="0.5" stroke-width="1.5"/>
      <line x1="6" y1="6" x2="22" y2="14" stroke="#ffffff" stroke-opacity="0.7" stroke-width="2"/>
    </g>

    <!-- Glass walls (outline) -->
    <path d="M 140 152
             L 372 152
             L 360 410
             Q 360 446 324 446
             L 188 446
             Q 152 446 152 410
             Z"
          fill="none"
          stroke="url(#glassEdge)"
          stroke-width="6"
          stroke-linejoin="round"/>

    <!-- Glass rim highlight -->
    <ellipse cx="256" cy="152" rx="116" ry="14" fill="none" stroke="url(#glassRim)" stroke-width="6"/>
    <ellipse cx="256" cy="152" rx="116" ry="14" fill="#0e0f14"/>
    <ellipse cx="256" cy="148" rx="116" ry="11" fill="none" stroke="url(#glassRim)" stroke-width="3" opacity="0.85"/>

    <!-- Subtle reflection streak on glass -->
    <path d="M 168 200 Q 162 320 188 410" stroke="#ffffff" stroke-opacity="0.18" stroke-width="6" fill="none" stroke-linecap="round"/>
    <path d="M 178 220 Q 174 320 196 396" stroke="#ffffff" stroke-opacity="0.10" stroke-width="3" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Tiny brass star/spark accents -->
  <g fill="#f5c662" opacity="0.65">
    <circle cx="100" cy="100" r="3"/>
    <circle cx="430" cy="120" r="2"/>
    <circle cx="78" cy="380" r="2"/>
    <circle cx="436" cy="404" r="3"/>
  </g>
</svg>
